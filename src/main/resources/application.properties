# Cấu hình kết nối MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/recruitment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Đổi cổng chạy web
server.port=8080
server.forward-headers-strategy=framework
app.base-url=${APP_BASE_URL:}

# CORS origins for browser calls through CloudFront/ALB.
# Override in production, for example:
# APP_CORS_ALLOWED_ORIGINS=https://d32lxiso1iao8j.cloudfront.net,http://recruit-alb-1002681411.ap-southeast-1.elb.amazonaws.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000,http://recruit-alb-1002681411.ap-southeast-1.elb.amazonaws.com,https://d32lxiso1iao8j.cloudfront.net}

# Cấu hình Upload File (Tối đa 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Cấu hình Email (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tantienlk2020@gmail.com
spring.mail.password=zgzi pbfb pqsk vuky
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT Secret Key
jwt.secret=${JWT_SECRET:MySecretKeyForJWTTokenGenerationAndValidation2024SecureKey}
jwt.expiration=86400000

# Error Pages
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always

# OAuth2 Google Login - Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET environment variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# SQL Init Mode - khong tu seed lai data moi lan restart
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# AWS S3
aws.region=${AWS_REGION:ap-southeast-1}
aws.s3.cv-bucket=${S3_CV_BUCKET:recruitpro-cv-storage-tien}
