<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Dat lai mat khau - RecruitBox</title>
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="auth-page">
        <div class="auth-container animate-fade-in-up">
            <div class="auth-branding">
                <div class="auth-branding-content">
                    <div class="brand-logo">
                        <span class="brand-icon-lg"><i class="fas fa-briefcase"></i></span>
                        <span class="brand-text-lg">RecruitBox</span>
                    </div>
                    <h1>Tao mat khau moi</h1>
                    <p>Nhap mat khau moi de hoan tat qua trinh khoi phuc tai khoan.</p>
                </div>
            </div>

            <div class="auth-form-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Dat lai mat khau</h2>
                        <p>Mat khau moi can co it nhat 6 ky tu.</p>
                    </div>

                    <div id="resetAlert" class="alert hidden" role="alert">
                        <i class="fas fa-info-circle me-2"></i>
                        <span id="resetAlertMessage"></span>
                    </div>

                    <form id="resetPasswordForm" class="auth-form">
                        <input type="hidden" id="token" th:value="${token}">

                        <div class="form-group">
                            <label for="newPassword" class="form-label">Mat khau moi</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="newPassword" required minlength="6" autocomplete="new-password">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Nhap lai mat khau</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" required minlength="6" autocomplete="new-password">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-submit w-100" id="resetBtn">
                            <span id="resetBtnText"><i class="fas fa-check me-2"></i>Cap nhat mat khau</span>
                            <span id="resetBtnLoading" class="hidden">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Dang xu ly...
                            </span>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p><a th:href="@{/login}">Quay lai dang nhap</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alert = document.getElementById('resetAlert');
            const message = document.getElementById('resetAlertMessage');
            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('resetBtnText');
            const btnLoading = document.getElementById('resetBtnLoading');

            if (!token) {
                alert.className = 'alert alert-danger';
                message.textContent = 'Link dat lai mat khau khong hop le.';
                return;
            }

            if (newPassword.length < 6) {
                alert.className = 'alert alert-danger';
                message.textContent = 'Mat khau moi phai co it nhat 6 ky tu.';
                return;
            }

            if (newPassword !== confirmPassword) {
                alert.className = 'alert alert-danger';
                message.textContent = 'Mat khau nhap lai khong khop.';
                return;
            }

            alert.className = 'alert hidden';
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await response.json();
                alert.className = 'alert ' + (response.ok ? 'alert-success' : 'alert-danger');
                message.textContent = data.message || 'Khong the dat lai mat khau.';
                if (response.ok) {
                    setTimeout(function() {
                        window.location.href = '/login';
                    }, 1500);
                }
            } catch (error) {
                alert.className = 'alert alert-danger';
                message.textContent = 'Co loi xay ra, vui long thu lai sau.';
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</th:block>
</body>
</html>
