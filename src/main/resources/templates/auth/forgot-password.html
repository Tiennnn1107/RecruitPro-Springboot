<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Quen mat khau - RecruitBox</title>
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="auth-page">
        <div class="auth-container animate-fade-in-up">
            <div class="auth-branding">
                <div class="auth-branding-content">
                    <div class="brand-logo">
                        <span class="brand-icon-lg"><i class="fas fa-briefcase"></i></span>
                        <span class="brand-text-lg">RecruitBox</span>
                    </div>
                    <h1>Dat lai mat khau</h1>
                    <p>Nhap email tai khoan cua ban. He thong se gui link tao mat khau moi neu email ton tai.</p>
                </div>
            </div>

            <div class="auth-form-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Quen mat khau?</h2>
                        <p>Link dat lai mat khau co hieu luc trong 30 phut.</p>
                    </div>

                    <div id="forgotAlert" class="alert hidden" role="alert">
                        <i class="fas fa-info-circle me-2"></i>
                        <span id="forgotAlertMessage"></span>
                    </div>

                    <form id="forgotPasswordForm" class="auth-form">
                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" required placeholder="name@example.com" autocomplete="email">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-submit w-100" id="forgotBtn">
                            <span id="forgotBtnText"><i class="fas fa-paper-plane me-2"></i>Gui link dat lai mat khau</span>
                            <span id="forgotBtnLoading" class="hidden">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Dang xu ly...
                            </span>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Da nho mat khau? <a th:href="@{/login}">Dang nhap</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const alert = document.getElementById('forgotAlert');
            const message = document.getElementById('forgotAlertMessage');
            const btn = document.getElementById('forgotBtn');
            const btnText = document.getElementById('forgotBtnText');
            const btnLoading = document.getElementById('forgotBtnLoading');

            alert.className = 'alert hidden';
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                alert.className = 'alert ' + (response.ok ? 'alert-success' : 'alert-danger');
                message.textContent = data.message || 'Khong the gui link dat lai mat khau.';
            } catch (error) {
                alert.className = 'alert alert-danger';
                message.textContent = 'Co loi xay ra, vui long thu lai sau.';
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</th:block>
</body>
</html>
